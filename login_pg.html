<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Login</title>
    <link rel="stylesheet" href="login_pg.css">
</head>
</head>
<!-- Background Video -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="assets/log.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<body>
<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- LEFT : LOGIN FORM -->
         
        <div class="login-form">
            <h2>Login an account</h2>
            

            <form id="loginForm">
             <label>Username</label>
             <input type="text" id="username" placeholder="Enter username" required>

             <label>Email</label>
             <input type="email" id="email" placeholder="Enter email" required>

              <label>Password</label>
             <input type="password" id="password" placeholder="Enter password" required>

             <button type="submit">Submit</button>
            </form>


            <div class="social-login">

                <button class="apple">🍎 Apple</button>
                <button class="google">♨️ Google</button>

            </div>

            <p class="bottom-text">
                New User? <a href="flip-auth.html">Register</a>
                <a href="newlanding_pg.html">Back to Home</a>
            </p>
        </div>

        <!-- RIGHT : IMAGE -->

        <div class="login-image">
            <img src="assets/Login.jpg"
                 alt="team work">
        </div>

    </div>

</div>

<script src="login_pg.js"></script>


</body>
</html>
