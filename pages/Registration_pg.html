<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration</title>
    <link rel="stylesheet" href="../styles/style_Registration_pg.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Customer Registration</h2>
        <p class="sub">Create your account</p>

        <form>
            <table>
                <tr>
                    <td><label>Full Name</label></td>
                    <td><input type="text" placeholder="Enter full name"></td>
                </tr>

                <tr>
                    <td><label>Mobile No</label></td>
                    <td><input type="number" placeholder="Enter mobile number"></td>
                </tr>

                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email" placeholder="Enter email"></td>
                </tr>

                <tr>
                    <td><label>Password</label></td>
                    <td><input type="password" placeholder="Enter password"></td>
                </tr>

                <tr>
                    <td><label>Confirm Password</label></td>
                    <td><input type="password" placeholder="Confirm password"></td>
                </tr>

                <tr>
                    <td><label>Address</label></td>
                    <td><textarea placeholder="Enter address"></textarea></td>
                </tr>

                <tr>
                    <td colspan="2" class="btn-row">
                        <button type="submit">Register</button>
                    </td>
                </tr>
            </table>
        </form>

        <p class="login-link">
            Already have an account? <a href="./login_pg.html">Login</a>
        </p>
    </div>
</div>

</body>
</html>
