<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kurti Measurement</title>
    <link rel="stylesheet" href="../styles/style1.css">
</head>
<body>

<div class="container">
    <h2>Kurti Measurement Form</h2>

    <form>
        <label>Full Length (in inches)</label>
        <input type="number" placeholder="e.g. 44">

        <label>Bust</label>
        <input type="number" placeholder="e.g. 36">

        <label>Waist</label>
        <input type="number" placeholder="e.g. 30">

        <label>Hip</label>
        <input type="number" placeholder="e.g. 38">

        <label>Shoulder</label>
        <input type="number" placeholder="e.g. 14">

        <label>Sleeve Length</label>
        <input type="number" placeholder="e.g. 18">

        <button type="submit">Save Measurement</button>
        
    </form>
</div>

</body>
</html>
