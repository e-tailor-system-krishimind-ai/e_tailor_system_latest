<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flip Login / Register</title>
  <link rel="stylesheet" href="../../styles/flip.css">
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="../../assets/log.mp4" type="video/mp4">
</video>

<div class="scene">
  <div class="card" id="authCard">

    <!-- REGISTER -->
    <div class="card-face front">
      <h2>Customer Registration</h2>

    <form id="registerForm">
     <input id="regName" required placeholder="Full Name">
     <input id="regEmail" type="email" required placeholder="Email">
     <input id="regPass" type="password" required placeholder="Password">
     <input id="regAddr" placeholder="Address">
     <button type="submit">Register</button>
    </form>

      <p>
        <a href="./newlanding_pg.html"></a>
        Already have an account?
        <span onclick="flipCard()">Login</span>
       
      </p>
    </div>

    <!-- LOGIN -->
    <div class="card-face back">
      <h2>Customer Login</h2>

    <form id="loginForm">
      <input id="logEmail" type="email" required placeholder="Email">
      <input id="logPass" type="password" required placeholder="Password">
      <button type="submit">Login</button>
    </form>

      <p>
        <a href="./newlanding_pg.html"></a>
        New user?
        <span onclick="flipCard()">Register</span>
        
      </p>
    </div>

  </div>
</div>

<script>
const API = "http://localhost:5000/api";

/* REGISTER */
document.getElementById("registerForm").addEventListener("submit", async e => {
  e.preventDefault();

  const res = await fetch(`${API}/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: regName.value,
      email: regEmail.value,
      password: regPass.value,
      address: regAddr.value
    })
  });

  const data = await res.json();
  alert(data.message);

  if (res.ok) flipCard();
});

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: logEmail.value,
      password: logPass.value
    })
  });

  const data = await res.json();

  if (!res.ok) return alert(data.message);

  localStorage.setItem("user", JSON.stringify(data.user));
  window.location.href = "../customer/landing-dashboard.html";
});

function flipCard() {
  document.getElementById("authCard").classList.toggle("flip");
}
</script>


<script src="../../scripts/flip-auth.js"></script>
</body>
</html>
