<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Hand Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .video-preview {
            position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
            border-radius: 10px; border: 2px solid #ce93d8; transform: scaleX(-1);
        }
        .btn-custom { background: #673ab7; color: white; border: none; margin-bottom: 5px; width: 100%; }
        .btn-custom:hover { background: #9575cd; color: white; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay text-white">
        <h5 class="mb-3">Particle Control</h5>
        <div class="d-grid gap-2">
            <button class="btn btn-custom" onclick="setShape('heart')">Heart</button>
            <button class="btn btn-custom" onclick="setShape('saturn')">Saturn</button>
            <button class="btn btn-custom" onclick="setShape('flower')">Flower</button>
            <button class="btn btn-custom" onclick="setShape('random')">Chaos (Explosion)</button>
        </div>
        <hr>
        <p class="small text-muted">Move hand to attract.<br>Pinch to change color.</p>
    </div>

    <video class="video-preview" id="input_video" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particleCount = 8000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 100;
            targetPositions[i] = positions[i];
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 50;

        // --- SHAPE LOGIC ---
        function setShape(type) {
            const pos = geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                if (type === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    z = (Math.random() - 0.5) * 5;
                } else if (type === 'saturn') {
                    const radius = i > particleCount/2 ? 15 + Math.random() * 5 : 8;
                    const angle = Math.random() * Math.PI * 2;
                    x = Math.cos(angle) * radius;
                    y = i > particleCount/2 ? (Math.random()-0.5)*2 : (Math.random()-0.5)*15;
                    z = Math.sin(angle) * radius;
                } else {
                    x = (Math.random() - 0.5) * 60;
                    y = (Math.random() - 0.5) * 60;
                    z = (Math.random() - 0.5) * 60;
                }
                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y;
                targetPositions[i * 3 + 2] = z;
            }
        }

        // --- MEDIAPIPE HANDS ---
        // --- GESTURE STATE VARIABLES ---
        let currentShapeIndex = 0;
        const shapes = ['heart', 'saturn', 'flower', 'random'];
        let lastHandX = 0;
        let swipeCooldown = false;

        // --- MEDIAPIPE HANDS ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({ 
            maxNumHands: 1, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.7, // Increased for better gesture accuracy
            minTrackingConfidence: 0.7 
        });
        
        let handX = 0, handY = 0;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 1. POSITION TRACKING (Attraction point)
                handX = (landmarks[8].x - 0.5) * -100; 
                handY = (landmarks[8].y - 0.5) * -100;

                // 2. PINCH GESTURE (Zoom In/Out)
                // Distance between Thumb Tip (4) and Index Tip (8)
                const thumb = landmarks[4];
                const index = landmarks[8];
                const pinchDist = Math.sqrt(
                    Math.pow(thumb.x - index.x, 2) + 
                    Math.pow(thumb.y - index.y, 2)
                );

                // Adjust Camera Zoom: Pinch In = Zoom In, Pinch Out = Zoom Out
                // Range mapped roughly from 30 to 120 units in 3D space
                let zoomTarget = 20 + (pinchDist * 200); 
                camera.position.z += (zoomTarget - camera.position.z) * 0.1;

                // 3. SWIPE GESTURE (Change Shape)
                // Tracking horizontal velocity of the wrist (landmark 0)
                const wristX = landmarks[0].x;
                const velocity = wristX - lastHandX;

                if (Math.abs(velocity) > 0.1 && !swipeCooldown) {
                    currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                    setShape(shapes[currentShapeIndex]);
                    
                    // Prevent rapid switching
                    swipeCooldown = true;
                    setTimeout(() => { swipeCooldown = false; }, 800);
                }
                lastHandX = wristX;

                // Visual Flair: Change particle color based on pinch
                material.color.setHSL(pinchDist * 2, 0.8, 0.6);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraFeed.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                // Morph to target shape (smoothed)
                pos[i] += (targetPositions[i] - pos[i]) * 0.08;
                pos[i+1] += (targetPositions[i+1] - pos[i+1]) * 0.08;
                pos[i+2] += (targetPositions[i+2] - pos[i+2]) * 0.08;

                // Hand Interaction (Attraction)
                const dx = handX - pos[i];
                const dy = handY - pos[i+1];
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 15) {
                    pos[i] += dx * 0.05;
                    pos[i+1] += dy * 0.05;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                // Morph to target shape
                pos[i] += (targetPositions[i] - pos[i]) * 0.05;
                pos[i+1] += (targetPositions[i+1] - pos[i+1]) * 0.05;
                pos[i+2] += (targetPositions[i+2] - pos[i+2]) * 0.05;

                // Hand Interaction (Attraction)
                const dx = handX - pos[i];
                const dy = handY - pos[i+1];
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 20) {
                    pos[i] += dx * 0.02;
                    pos[i+1] += dy * 0.02;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
