<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | E-Tailor</title>

  <style>

    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:linear-gradient(135deg,#000,#2c1a10);
      font-family:Arial;
    }

    .login-box{

      width:350px;
      padding:30px;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);

      border-radius:20px;
      box-shadow:0 20px 40px rgba(0,0,0,.5);

      color:white;
      text-align:center;
    }

    .login-box h2{
      margin-bottom:25px;
      color:#ff6a3d;
    }

    input{
      width:80%;
      padding:12px;

      margin-bottom:15px;

      border:none;
      border-radius:10px;
      outline:none;
    }

    button{

      width:100%;
      padding:12px;

      background:#ff6a3d;
      color:white;

      border:none;
      border-radius:10px;

      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#ff824f;
    }

    .error{
      color:red;
      margin-top:10px;
      display:none;
    }

  </style>
</head>

<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error" class="error">Invalid Login</p>

</div>


<script>

function login(){

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;


  /* CHANGE HERE LATER */
  if(user==="e-tailor_system" && pass==="radhe_radhe"){

    localStorage.setItem("admin","true");

    window.location.href = "./admin-dashboard.html";
  }
  else{
    document.getElementById("error").style.display="block";
  }

}

</script>

</body>
</html>
