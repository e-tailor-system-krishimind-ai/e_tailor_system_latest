<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blouse Measurement</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">
    <h2>Blouse Measurement Form</h2>

    <form>
        <label>Bust</label>
        <input type="number" placeholder="e.g. 34">

        <label>Under Bust</label>
        <input type="number" placeholder="e.g. 30">

        <label>Blouse Length</label>
        <input type="number" placeholder="e.g. 15">

        <label>Shoulder</label>
        <input type="number" placeholder="e.g. 13">

        <label>Sleeve Length</label>
        <input type="number" placeholder="e.g. 10">

        <label>Neck Depth</label>
        <input type="number" placeholder="e.g. 7">

        <button type="submit">Save Measurement</button>
    
    </form>
</div>

</body>
</html>
