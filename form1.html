<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Tailor – Select Dress</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <div class="container">
    <h2>Select Category</h2>
    <select onchange="location = this.value;">
      <option value="">-- Select --</option>

      <optgroup label="Mens">
        <option value="shirt.html">Shirt</option>
        <option value="pant.html">Pant</option>
        <option value="suit.html">Suit</option>
      </optgroup>

      <optgroup label="Women">
        <option value="kurti.html">Kurti</option>
        <option value="blouse.html">Blouse</option>
      </optgroup>
    </select>
  </div>
</body>
</html>
