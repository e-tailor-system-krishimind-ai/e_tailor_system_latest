<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard | e-Tailor</title>

  <link rel="stylesheet" href="Clnt_dashboad.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ================= TOP NAVBAR ================= -->
<header class="topbar">
  <div class="brand">
    <img src="assets/logo2.png" alt="logo">
    <span>e-Tailor</span>
  </div>

  <div class="user">
    <img src="assets/user_icon.avif" alt="user">
    <span id="userName">Customer</span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<!-- ================= MAIN LAYOUT ================= -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <ul>
      <li class="active"><a href="Clnt_dashboad.html">🏠 Dashboard</a></li>
      <li><a href="measurements.html">📐 My Measurements</a></li>
      <li><a href="new_order.html">🧵 New Stitch Order</a></li>
      <li><a href="orders.html">📦 My Orders</a></li>
      <li><a href="vr_tryon.html">🤖 VR Try-On</a></li>
      <li><a href="payments.html">💳 Payments</a></li>
      <li><a href="profile.html">⚙️ Profile</a></li>
    </ul>
  </aside>

  <!-- ================= CONTENT ================= -->
  <main class="content">

    <h2 class="page-title">Dashboard Overview</h2>

    <!-- ===== STATS (DYNAMIC) ===== -->
    <div class="stats">
      <div class="stat-card">
        <span>Total Orders</span>
        <h3 id="totalOrders">0</h3>
      </div>
      <div class="stat-card">
        <span>Active Orders</span>
        <h3 id="activeOrders">0</h3>
      </div>
      <div class="stat-card">
        <span>Completed</span>
        <h3 id="completedOrders">0</h3>
      </div>
      <div class="stat-card">
        <span>Measurements Saved</span>
        <h3 id="measurementsSaved">No</h3>
      </div>
    </div>

    <!-- ===== RECENT ORDERS ===== -->
    <h2 class="section-title">Recent Orders</h2>

    <div class="table-card">
      <table class="table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Cloth</th>
            <th>Status</th>
            <th>Delivery</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="ordersTable">
          <!-- JS se fill hoga -->
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- ================= JS ================= -->
<script>
/* ===== AUTH CHECK ===== */
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
  window.location.href = "flip-auth.html";
}

/* ===== SHOW USER NAME ===== */
document.getElementById("userName").innerText = user.name;

/* ===== LOGOUT ===== */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "newlanding_pg.html";
}

/* ===== FETCH DASHBOARD DATA ===== */
fetch(`http://localhost:5000/api/dashboard/${user.id}`)
  .then(res => res.json())
  .then(data => {

    // Stats
    document.getElementById("totalOrders").innerText = data.stats.totalOrders;
    document.getElementById("activeOrders").innerText = data.stats.activeOrders;
    document.getElementById("completedOrders").innerText = data.stats.completedOrders;
    document.getElementById("measurementsSaved").innerText = data.stats.measurementsSaved;

    // Orders
    const table = document.getElementById("ordersTable");
    table.innerHTML = "";

    if (data.recentOrders.length === 0) {
      table.innerHTML = `<tr><td colspan="5" class="text-center">No orders yet</td></tr>`;
    }

    data.recentOrders.forEach(order => {
      table.innerHTML += `
        <tr>
          <td>#${order.orderId}</td>
          <td>${order.cloth}</td>
          <td>${order.status}</td>
          <td>${order.delivery}</td>
          <td>
            <a href="view-order.html?orderId=${order.orderId}" class="btn btn-warning btn-sm">View</a>
          </td>
        </tr>
      `;
    });
  })
  .catch(err => {
    console.error("Dashboard error:", err);
  });
</script>

</body>
</html>
