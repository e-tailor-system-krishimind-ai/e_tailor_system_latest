<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Stitch Order</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Clnt_dashboad.css">
</head>
<body>


<!-- TOP NAVBAR -->
<header class="topbar">
  <div class="brand">
    <img src="assets/logo2.png" alt="logo">
    <span>e-Tailor</span>
  </div>

  <div class="user">
    <img src="assets/user_icon.avif" alt="user">
    <span id="userName">Customer</span>
    <button onclick="logout()">Logout</button>
  </div>
</header>


<div class="layout">
<aside class="sidebar">
<ul>
<li><a href="Clnt_dashboad.html">🏠 Dashboard</a></li>
<li><a href="measurements.html">📐 My Measurements</a></li>
<li class="active">🧵 New Stitch Order</li>
<li><a href="orders.html">📦 My Orders</a></li>
<li><a href="vr_try.html">🤖 VR Try-On</a></li>
<li><a href="payments.html">💳 Payments</a></li>
<li><a href="profile.html">⚙️ Profile</a></li>
</ul>
</aside>

<main class="content">
<h2 class="page-title">New Stitch Order</h2>

<div class="card p-4 shadow rounded-4">
<form class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Select Cloth</label>
    <select class="form-select">
      <option>Formal Shirt</option>
      <option>Kurta</option>
      <option>Suit</option>
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label">Delivery Date</label>
    <input type="date" class="form-control">
  </div>

  <div class="col-12">
    <label class="form-label">Special Instructions</label>
    <textarea class="form-control" rows="3"></textarea>
  </div>

  <div class="col-12 text-end">
    <button class="btn btn-warning px-4 rounded-pill">Place Order</button>
  </div>
</form>
</div>
</main>
</div>

<script src="auth.js"></script>
<script>
const user = getLoggedInUser();
if (user) {
  document.getElementById("userName").innerText = user.name;
}
</script>


<script src="Clnt_dashboad.js"></script>

</body>
</html>
